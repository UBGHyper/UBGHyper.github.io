    <script>
        let konamiCode = [];

        document.addEventListener("keydown", function(event) {
            const keyMap = {
                "ArrowUp": "Up",
                "ArrowDown": "Down",
                "ArrowLeft": "Left",
                "ArrowRight": "Right",
                "b": "B",
                "B": "B",
                "a": "A",
                "A": "A"
            };
            if (keyMap[event.key]) {
                konamiCode.push(keyMap[event.key]);
            }

            if (konamiCode.join(",") === "Up,Up,Down,Down,Left,Right,Left,Right,B,A") {
                konamiCode = [];
                document.body.style.background = getRandomColor();
            }
        });

        function getRandomColor() {
            const letters = "0123456789ABCDEF";
            let color = "#";
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        const toggleSwitch = document.getElementById("toggle-switch");
        const favicon = document.querySelector("link[rel='icon']");
        const defaultFavicon = "content/favicons/tab.png";
        const toggledFavicon = "content/favicons/classroom.png";
        const defaultTitle = "UBGHyper - Home";
        const toggledTitle = "Classroom";

        toggleSwitch.addEventListener("change", () => {
            favicon.href = toggleSwitch.checked ? toggledFavicon : defaultFavicon;
            document.title = toggleSwitch.checked ? toggledTitle : defaultTitle;
        });

        document.getElementById('themeSelect').addEventListener('change', function() {
            const theme = this.value;
            document.body.className = theme;
            document.querySelector('.footer').className = `footer ${theme}`;
        });

        function unlockSecretGame() {
            alert('Congratulations! You found a secret game!');

        }
    </script>
