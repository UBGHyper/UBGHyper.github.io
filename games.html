    <style>
        /* Default (Light Mode) */
        :root {
            --bg-color: #000000;
            --text-color: #1f1f1f;
            --link-color: #ff6600;
            --navbar-bg: #272727;
            --navbar-link-color: #2c2c2c;
            --carousel-bg: #fff;
            --button-bg: #ff6600;
            --background-image: url('../assets/background/background.png');
            --card-bg-color: white; /* Light mode card background */
            --card-text-color: #333; /* Light mode card text */
            --font-family: 'Poppins', sans-serif;
            --sb-track-color: #747474;
            --sb-thumb-color: #ff8500;
            --sb-size: 14px;
            --game-colour: #cacaca;
            --game-backround-colour: #4b4b4b;
        }


        .game {
            color: var(--game-colour);
            background-color: var(--game-backround-colour);
        }

        body {
        font-family: var(--font-family);
        margin: 0;
        padding: 0;
        background: url('../assets/background/new-background.jpg') no-repeat center center fixed;
        background-size: cover;
        color: var(--text-color);
        transition: all 0.3s ease;
    }

        /* Global Header Styling */
        h1, h2 {
            color: var(--text-color);
        }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .navbar {
   display: flex;
   justify-content: space-between;
   align-items: center; /* Ensures items are centered vertically */
   background-color: var(--navbar-bg);
   padding: 3px 15px; /* Further reduce padding to make the nav bar thinner */
   border-bottom: 2px solid #444;
   /* Remove the sticky positioning */
   /* position: sticky; */
   /* top: 0; */
   /* z-index: 10; */
}

.nav-links {
   list-style: none;
   display: flex;
   align-items: center; /* Center the nav links vertically */
   gap: 20px;
   margin: 0;
   padding: 0;
}

.nav-links li {
   margin: 0;
   line-height: 1.5; /* Adjust line-height for better vertical alignment */
}

.nav-links a,
#randomGameBtn {
   color: var(--text-color);
   text-decoration: none;
   font-weight: 500;
   font-size: 18px;
   line-height: 1.5; /* Adjust to align text properly */
   background: none; /* Remove button background */
   border: none; /* Remove button border */
   cursor: pointer; /* Ensure cursor is pointer for button */
   padding: 0; /* Remove any button padding */
   margin: 0;
}

.nav-links a:hover,
#randomGameBtn:hover {
   color: var(--navbar-link-color);
}

        /* Search Bar Styling */
        .search-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-box {
            position: relative;
            width: 250px;
            height: 35px;
            border-radius: 20px;
            background-color: var(--navbar-bg);
            display: flex;
            align-items: center;
            padding: 0 10px;
            transition: width 0.3s ease;
        }

        .search-box input {
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-colour);
            font-size: 16px;
            width: 100%;
            padding: 5px 0;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .search-box input::placeholder {
            color: #aaa;
        }

        .search-box input:focus {
            width: 180px;
            padding: 0 10px;
        }

        /* Toggle Switch Styles */
        .toggle {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 15px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--button-bg);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(30px);
        }

        .center {
            text-align: center;
            margin: 20px 0;
        }

        #gamesContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            overflow-y: auto; 
            padding: 10px;
        }

        .game-card {
            background: var(--card-bg-color); /* Light/Dark responsive background */
            color: var(--card-text-color); /* Light/Dark responsive text color */
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 200px;
            text-align: center;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        /* Custom Scrollbar Styling */
        #gamesContainer::-webkit-scrollbar {
            width: var(--sb-size);
        }

        #gamesContainer::-webkit-scrollbar-track {
            background: var(--sb-track-color);
            border-radius: 6px;
        }

        #gamesContainer::-webkit-scrollbar-thumb {
            background: var(--sb-thumb-color);
            border-radius: 6px;
        }

        #gamesContainer::-webkit-scrollbar-thumb:hover {
            background: #ad5400; /* Hover color of the thumb */
        }
    </style>
    
    <script src="../config/main.js" type="module"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo" style="display: flex; align-items: center;">
           <!-- Logo Image -->
           <h2>UBGHyper</h2>
        </div>
        <ul class="nav-links">
           <li><a href="https://ubghyper.github.io/">Home</a></li>
           <li><a href="https://ubghyper.github.io/games.html">Games</a></li>
           <li><a href="https://ubghyper.github.io/customize.html">Customize</a></li>
           <li><a href="https://ubghyper.github.io/savedata.html">Save Editor</a></li>
           <button id="randomGameBtn">Random</button>
        </ul>
        </div>
     </nav>

    </nav>
    
    <div class="center">
        <h1 id="title">Games</h1>
    </div>
    <div id="gamesContainer"></div>

    <script>
                document.addEventListener('DOMContentLoaded', () => {
            // Function to update last played game
            function updateLastPlayedGame(gameName) {
                localStorage.setItem('lastPlayedGame', gameName);
                document.getElementById('lastPlayedGame').textContent = gameName || "None";
            }

            // Load last played game on page load
            const lastPlayedGame = localStorage.getItem('lastPlayedGame');
            if (lastPlayedGame) {
                document.getElementById('lastPlayedGame').textContent = lastPlayedGame;
            }

            // Example: You need to call updateLastPlayedGame('Game Name') whenever a game is played
            // For example, set up event listeners on game start actions
        });
        document.addEventListener('DOMContentLoaded', () => {
    function applyCustomizations(customizations) {
        document.documentElement.style.setProperty('--font-family', customizations.fontFamily);
        document.documentElement.style.setProperty('--text-color', customizations.textColor);
        document.documentElement.style.setProperty('--navbar-bg', customizations.navbarColor);

        document.body.style.backgroundImage = `url(${customizations.backgroundImage || ''})`;
        document.body.style.fontFamily = customizations.fontFamily;
        document.body.style.color = customizations.textColor;
        document.querySelector('.navbar').style.backgroundColor = customizations.navbarColor;

        document.querySelectorAll('.navbar a').forEach(link => {
            link.style.color = customizations.themeColor;
        });
        document.querySelectorAll('.button-container button').forEach(button => {
            button.style.backgroundColor = customizations.themeColor;
        });
    }

    function loadSettings() {
        const savedSettings = JSON.parse(localStorage.getItem('ubgCustomizations'));
        if (savedSettings) {
            applyCustomizations(savedSettings);
        }
    }

    loadSettings();
});
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            const currentTheme = localStorage.getItem('theme') || 'light';

            // Set initial theme
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.checked = true;
            } else {
                document.body.classList.remove('dark-mode');
                themeToggle.checked = false;
            }

            themeToggle.addEventListener('change', () => {
                if (themeToggle.checked) {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('theme', 'light');
                }
            });
        });    

        document.getElementById('randomGameBtn').addEventListener('click', () => {
         fetch('./config/games.json')
         .then(response => response.json())
         .then(games => {
             if (games.length > 0) {
                 // Select a random game
                 const randomIndex = Math.floor(Math.random() * games.length);
                 const randomGame = games[randomIndex];
         
                 // Construct URL based on the selected random game
                 const gameUrl = randomGame.url;
                 
                 // Redirect to the game page with the selected random game URL
                 window.location.href = `./play.html?gameurl=${encodeURIComponent(gameUrl)}`;
             } else {
                 alert('No games available');
             }
         })
         .catch(error => {
             console.error('Error fetching games:', error);
             alert('Error loading games');
         });
         });
    </script>
</body>
</html>
