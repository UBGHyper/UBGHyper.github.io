<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBG Hyper</title>
    <script src="../config/global.js"></script>
    <link rel="stylesheet" href="config/light.css" id="themeStyle">
    <link rel="stylesheet" href="config/searchbar.css" id="themeStyle">
    <link rel="icon" href="../assets/icons/ubghyper.ico" id="faviconLink">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8895667704497452" crossorigin="anonymous"></script>
    
    <meta property="og:image" content="../assets/icons/ubghyper.ico">
    <meta property="og:url" content="https://ubghyper.github.io/">
    <meta property="og:site_name" content="Free, unblocked and fun games">
    <meta name="theme-color" content="#ff8000">
    <meta name="google-site-verification" content="Olbv8f2uRODkQ97-bibYZUUNSr2m2cfCUuH82ntbjoQ">
    <meta property="og:description" content="Find fun, unblocked & free games here at UBGHyper.">
    <meta name="description" content="Find fun, unblocked & free games here at UBGHyper.">
    <meta name="author" content="UBGHyper on GitHub">   

    <style>
        /* Default (Light Mode) */
        :root {
            --bg-color: #f9f9f9;
            --text-colour: #333;
            --link-color: #ff6600;
            --navbar-bg: #333;
            --navbar-link-color: #fff;
            --carousel-bg: #fff;
            --button-bg: #ff6600;
            --background-image: url('../assets/background/background-white.png');
            --card-bg-color: white; /* Light mode card background */
            --card-text-color: #333; /* Light mode card text */
            --font-family: 'Poppins', sans-serif;
            --sb-track-color: #747474;
            --sb-thumb-color: #ff8500;
            --sb-size: 14px;
            --game-colour: #cacaca;
            --game-backround-colour: #4b4b4b;
        }

        /* Dark Mode */
        .dark-mode {
            --bg-color: #333;
            --text-colour: #d4d4d4;
            --link-color: #ff8500;
            --navbar-bg: #111;
            --navbar-link-color: #fff;
            --carousel-bg: #222;
            --button-bg: #ff5e00;
            --background-image: url('../assets/background/background.png');
            --card-bg-color: #444; /* Dark mode card background */
            --card-text-color: #fff; /* Dark mode card text */
            --sb-track-color: #232E33;
            --sb-thumb-color: #ff8500;
            --sb-size: 14px;
            --game-colour: #ffffff;
            --game-backround-colour: #222222;
        }

        .game {
            color: var(--game-colour);
            background-color: var(--game-backround-colour);
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image: var(--background-image);
            background-size: cover;
            background-attachment: fixed;
            transition: all 0.3s ease;
        }

        /* Global Header Styling */
        h1, h2 {
            color: var(--text-colour);
        }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--navbar-bg);
            padding: 0px 30px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid #444;
        }

        .navbar .logo h2 {
            color: var(--navbar-link-color);
            font-size: 20px;
            font-weight: 600;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            position: static;
        }

        .nav-links li {
            margin: 0;
        }

        .nav-links a {
            color: var(--navbar-link-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 18px;
        }

        .nav-links a:hover {
            color: var(--link-color);
        }


        /* Toggle Switch Styles */
        .toggle {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 15px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--button-bg);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(30px);
        }

        .center {
            text-align: center;
            margin: 20px 0;
        }

        #gamesContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            overflow-y: auto; 
            padding: 10px;
        }

        .game-card {
            background: var(--card-bg-color); /* Light/Dark responsive background */
            color: var(--card-text-color); /* Light/Dark responsive text color */
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 200px;
            text-align: center;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        /* Custom Scrollbar Styling */
        #gamesContainer::-webkit-scrollbar {
            width: var(--sb-size);
        }

        #gamesContainer::-webkit-scrollbar-track {
            background: var(--sb-track-color);
            border-radius: 6px;
        }

        #gamesContainer::-webkit-scrollbar-thumb {
            background: var(--sb-thumb-color);
            border-radius: 6px;
        }

        #gamesContainer::-webkit-scrollbar-thumb:hover {
            background: #ad5400; /* Hover color of the thumb */
        }
    </style>
    
    <script src="../config/main.js" type="module"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo" style="display: flex; align-items: center;">
            <!-- Logo Image -->
            <img src="../assets/icons/ubghyper.ico" alt="Logo" style="height: 30px; margin-right: 10px;">
            <h2>UBGHyper</h2>
        </div>
        <ul class="nav-links">
            <li><a href="https://ubghyper.github.io/">Home</a></li>
            <li><a href="https://ubghyper.github.io/games.html">Games</a></li>
            <li><a href="https://ubghyper.github.io/customize.html">Customize</a></li>
            <li><a href="https://ubghyper.github.io/contact.html">Contact</a></li>
        </ul>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search Games"/>
                <span></span>
            </div>
        </div>


        <!-- Theme Toggle -->
        <div class="toggle-group">
            <label class="toggle" aria-label="Toggle theme">
                <input type="checkbox" id="themeToggle">
                <span class="toggle-slider"></span>
            </label>
        </div>
    </nav>
    
    <div class="center">
        <h1 id="title">Games</h1>
    </div>
    <div id="gamesContainer"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            const currentTheme = localStorage.getItem('theme') || 'light';

            // Set initial theme
            if (currentTheme === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.checked = true;
            } else {
                document.body.classList.remove('dark-mode');
                themeToggle.checked = false;
            }

            themeToggle.addEventListener('change', () => {
                if (themeToggle.checked) {
                    document.body.classList.add('dark-mode');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.body.classList.remove('dark-mode');
                    localStorage.setItem('theme', 'light');
                }
            });
        });    
    </script>
</body>
</html>
