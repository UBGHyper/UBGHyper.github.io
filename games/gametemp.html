<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UBGHyper - Home</title>

    <script src="config/main.js" type="module"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
      }

      iframe {
        width: 100%;
        height: 100vh;
        border: none;
      }
    </style>
  </head>
  <body>
 <iframe id="game-iframe" src="https://cbgamesdev.github.io/chilibowlflash/sm64/index.html"
width="800px" height="600px" frameborder="0" style=" display: block; border: 20px solid #706f6f; background-image: url('../Icons/boot.gif'); background-size: auto; backround-repeat: no-repeat; background-position: 50%; "
<iframe>
</iframe>
<div class="game-title">
  <div>
    <span class="game-title-text" style="font-family: 'arcade1', sans-serif; color: #0d0c0c;">
      PLACEHOLDER
    </span>
    <span class="game-title-subtext">
      By NAME
    </span>
  </div>
  <button onclick="toggleFullscreen()">
    <img src="../Icons/fullscreen.svg" alt="Fullscreen" width="32" height="32"
    />
  </button>
</div>
</div>
<script>
  function toggleFullscreen() {
    var iframe = document.getElementById("game-iframe");
    if (!document.fullscreenElement) {
      iframe.requestFullscreen().
      catch((err) = >{
        console.log(`Error attempting to enable full - screen mode: $ {
          err.message
        } ($ {
          err.name
        })`);
      });
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    }
  }
</script>
</div>
</html>
