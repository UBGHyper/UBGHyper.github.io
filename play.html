<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBGHyper - Games</title>
  <link rel="stylesheet" href="config/main.css">
  <link rel="icon" type="image/png" href="content/favicons/tab.png">
  <style>
    .switch-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: orange;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
      margin-right: 10px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #333;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .mode-text {
      font-family: 'Apple-font', sans-serif;
      color: #333;
      transition: color 0.4s;
    }

    .mode-text.light-mode {
      color: black;
    }

    body {
      margin: 0;
      font-family: 'Apple', sans-serif;
      background-color: #f0f0f0;
      transition: background-color 0.4s;
    }

    body.light-mode {
      background-color: #fff;
    }

    body::-webkit-scrollbar {
      width: 12px;
    }

    body::-webkit-scrollbar-track {
      background: black;
    }

    body::-webkit-scrollbar-thumb {
      background-color: black;
      border-radius: 20px;
      border: 3px solid orange;
    }

    .back-button {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    #gameFrame {
      display: block;
      margin: 40px auto;
      border: 20px solid #706f6f;
      background-image: url('../content/favicons/loading.gif');
      background-size: cover;
      background-position: center;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

    .game-title {
      text-align: center;
      margin: 20px auto;
      font-size: 24px;
      font-weight: bold;
      width: 800px;
      color: #333;
    }

    #fullscreenButton, #changeTabButton {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: transparent;
      border: none;
      padding: 10px;
      cursor: pointer;
    }

    #fullscreenButton img, .back-button img {
      width: 32px;
      height: 32px;
    }

    #changeTabButton {
      top: 50px;
      background: #333;
      color: white;
      border-radius: 5px;
      padding: 10px 15px;
      cursor: pointer;
      transition: background-color 0.4s, transform 0.4s;
    }

    #changeTabButton:hover {
      background-color: #555;
      transform: scale(1.05);
    }

  </style>
</head>
<body>
  <!-- Back button -->
  <button class="back-button" onclick="window.location.href='index.html'">
    <img src="../content/favicons/back.png" alt="Back">
  </button>

  <!-- Game iframe -->
  <iframe id="gameFrame" width="900px" height="700px" frameborder="0"></iframe>

  <!-- Game title -->
  <div class="game-title">
    <h2 id="gameTitle"></h2>
  </div>

  <!-- Fullscreen button -->
  <button id="fullscreenButton">
    <img src="../content/favicons/fullscreen.png" alt="Fullscreen">
  </button>

  <!-- Change tab button -->
  <button id="changeTabButton">Change Tab Icon and Name</button>

  <div class="switch-container">
    <label class="switch">
      <input type="checkbox" id="lightModeToggle">
      <span class="slider"></span>
    </label>
    <span class="mode-text">Dark Mode On</span>
  </div>

  <!-- Script to handle game loading and fullscreen functionality -->
  <script type="module">
    const serverUrl = "https://ubghyper.github.io/GameList.github.io/";
    const urlParams = new URLSearchParams(window.location.search);
    const gameUrl = urlParams.get("gameurl");

    if (!gameUrl) {
      alert("Game URL not provided!");
      window.location.href = "/"; // Redirect to homepage if game URL is missing
    } else {
      const embedUrl = `${serverUrl}/${gameUrl.replace(/\/$/, '')}`;
      document.getElementById("gameFrame").src = embedUrl;
      const title = gameUrl.replace(/[-\/]/g, ' ').replace(/\b\w/g, (m) => m.toUpperCase());
      document.getElementById("gameTitle").textContent = title;
    }

    let isFullscreen = false;

    document.getElementById("fullscreenButton").addEventListener("click", () => {
      if (!isFullscreen) {
        document.getElementById("gameFrame").requestFullscreen().catch((err) => {
          console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
        });
        isFullscreen = true;
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen().catch((err) => {
            console.log(`Error attempting to disable full-screen mode: ${err.message} (${err.name})`);
          });
          isFullscreen = false;
        }
      }
    });

    document.getElementById("changeTabButton").addEventListener("click", () => {
      const favicon = document.querySelector("link[rel='icon']");
      favicon.href = "content/favicons/classroom.png";
      document.title = "Classroom";
    });

    document.getElementById('lightModeToggle').addEventListener('change', function() {
      document.body.classList.toggle('light-mode');
      document.querySelector('.mode-text').classList.toggle('light-mode');
      document.querySelector('.mode-text').textContent = this.checked ? 'Dark Mode Off' : 'Dark Mode On';
    });
  </script>
</body>
</html>
