<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBGHyper - Home</title>
  <link rel="stylesheet" href="config/main.css">
  <style>
    /* Add some basic styling for the back button */
   .back-button {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1; /* make sure it's on top of the iframe */
    }

    /* Center the iframe */
    #gameFrame {
      display: block;
      margin: 40px auto;
      border: 20px solid #706f6f;
      background-image: url('../Icons/boot.gif');
      background-size: auto;
      background-repeat: no-repeat;
      background-position: 50%;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

    /* Style the game title */
   .game-title {
      text-align: center;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 50px;
    }

    /* Style the fullscreen button */
    button {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: #706f6f;
      border: none;
      padding: 10px;
      cursor: pointer;
    }

    button img {
      width: 32px;
      height: 32px;
    }
  </style>
</head>
<body>
  <!-- Add the back button -->
  <a href="index.html" class="back-button">
    <img src="../content/favicons/back.svg" alt="Back" width="32" height="32"/>
  </a>
  <iframe id="gameFrame" width="800px" height="600px" frameborder="0"></iframe>
  <div class="game-title">
    <h2 id="gameTitle"></h2>
  </div>
  <button id="fullscreenButton">
    <img src="../Icons/fullscreen.svg" alt="Fullscreen" width="32" height="32"/>
  </button>
  <script type="module">
    const serverUrl = "https://parcoil-assets.onrender.com";
    const urlParams = new URLSearchParams(window.location.search);
    const gameUrl = urlParams.get("gameurl");

    if (!gameUrl) {
      alert("Game URL not provided!");
      window.location.href = "/"; // Redirect to homepage if game URL is missing
    } else {
      const embedUrl = `${serverUrl}/${gameUrl.replace(/\/$/, '')}`; // remove trailing slash
      document.getElementById("gameFrame").src = embedUrl;
      const title = gameUrl.replace(/[-\/]/g, '').replace(/\b\w/g, (m) => m.toUpperCase()).replace(/\w/g, (m) => m.charAt(0).toUpperCase() + m.slice(1).toLowerCase()); // replace dashes and forward slashes with spaces, autocapitalize first letters, and capitalize the first letter of each word
      document.getElementById("gameTitle").textContent = title;
    }

    let isFullscreen = false;

    document.getElementById("fullscreenButton").addEventListener("click", toggleFullscreen);

    function toggleFullscreen() {
      if (!isFullscreen) {
        document.getElementById("gameFrame").requestFullscreen()
       .catch((err) => {
          console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
        });
        isFullscreen = true;
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
        isFullscreen = false;
      }
    }
  </script>
</body>
</html>
