<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBGHyper - Home</title>
  <link rel="stylesheet" href="config/main.css">
  <style>
    /* Move styles to a separate CSS file or keep them here, but avoid mixing with JavaScript */
    body {
      margin: 0;
      padding: 0;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="gameFrame"></iframe>
  <script type="module">
    // Removed duplicate script tag and moved JavaScript code to the bottom of the body
    const serverUrl = "https://parcoil-assets.onrender.com";
    const urlParams = new URLSearchParams(window.location.search);
    const gameUrl = urlParams.get("gameurl");

    if (!gameUrl) {
      alert("Game URL not provided!");
      window.location.href = "/"; // Redirect to homepage if game URL is missing
    } else {
      const embedUrl = `${serverUrl}/${gameUrl}`;
      document.getElementById("gameFrame").src = embedUrl;
    }
  </script>
</body>
</html>
