<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBGHyper - Games</title>
  <link rel="stylesheet" href="config/main.css">
  <link rel="icon" type="image/png" href="content/favicons/tab.png">
  <style>
    /* Add some basic styling for the back button */
   .back-button {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1; /* make sure it's on top of the iframe */
    }

    /* Center the iframe */
    #gameFrame {
      display: block;
      margin: 40px auto;
      border: 20px solid #706f6f;
      background-image: url('../content/favicons/loading.gif'); /* add a background image */
      background-size: cover; /* scale the image to cover the entire iframe */
      background-position: center; /* center the image */
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

    /* Style the game title */
   .game-title {
      text-align: center;
      margin: 20px auto; /* add some margin to separate from iframe */
      font-family: 'Apple', sans-serif; /* specify font family */
      font-size: 18px; /* make title smaller */
      width: 800px; /* match the width of the iframe */
    }

    /* Style the fullscreen button */
    button {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: #706f6f;
      border: none;
      padding: 10px;
      cursor: pointer;
    }

    button img {
      width: 32px;
      height: 32px;
    }
  </style>
</head>
<body>
  <!-- Add the back button -->
  <a href="index.html" class="back-button">
    <img src="../content/favicons/back.png" alt="Back" width="32" height="32"/>
  </a>
  <iframe id="gameFrame" width="800px" height="600px" frameborder="0"></iframe>
  <div class="game-title">
    <h2 id="gameTitle"></h2>
  </div>
  <button id="fullscreenButton">
    <img src="../Icons/fullscreen.png" alt="Fullscreen" width="32" height="32"/>
  </button>
  <script type="module">
    const serverUrl = "https://parcoil-assets.onrender.com";
    const urlParams = new URLSearchParams(window.location.search);
    const gameUrl = urlParams.get("gameurl");

    if (!gameUrl) {
      alert("Game URL not provided!");
      window.location.href = "/"; // Redirect to homepage if game URL is missing
    } else {
      const embedUrl = `${serverUrl}/${gameUrl.replace(/\/$/, '')}`; // remove trailing slash
      document.getElementById("gameFrame").src = embedUrl;
      const title = gameUrl.replace(/[-\/]/g, '').replace(/\b\w/g, (m) => m.toUpperCase()).replace(/\w/g, (m) => m.charAt(0).toUpperCase() + m.slice(1).toLowerCase()); // replace dashes and forward slashes with spaces, autocapitalize first letters, and capitalize the first letter of each word
      document.getElementById("gameTitle").textContent = title;
    }

    let isFullscreen = false;

    document.getElementById("fullscreenButton").addEventListener("click", toggleFullscreen);

    function toggleFullscreen() {
      if (!isFullscreen) {
        document.getElementById("gameFrame").requestFullscreen()
     .catch((err) => {
          console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
        });
        isFullscreen = true;
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen()
       .catch((err) => {
            console.log(`Error attempting to disable full-screen mode: ${err.message} (${err.name})`);
          });
          isFullscreen = false;
        }
      }
    }
  </script>
</body>
</html>
