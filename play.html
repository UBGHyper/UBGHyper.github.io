<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGHyper</title>
    <link id="favicon" rel="icon" href="../assets/icons/ubghyper.ico" type="image/x-icon">
    <style>
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background-image: url('../assets/background/background.png'); /* Replace with your image path */
    background-size: cover; /* Optional: makes the image cover the whole area */
    background-position: center; /* Optional: centers the image */
    transition: background-color 0.3s, color 0.3s;
}

        #gameFrame {
            border: 10px solid #ababab; /* Thinner border */
            border-bottom: 70px solid #f7b97e; /* Thicker bottom border */
            border-radius: 20px; /* Rounded corners */
            width: 300%; /* Increased width */
            height: 740px; /* Increased height */
            transition: all 1s ease; /* Smooth transition */
            box-sizing: border-box; /* Ensure padding and border are included in width/height */
            position: relative;
        }
        #controls {
            position: absolute;
            bottom: 10px; /* Adjust as needed */
            left: 10px; /* Adjust as needed */
            display: flex;
            align-items: center;
            background: white; /* Background for better visibility */
            padding: 10px;
            border-radius: 10px; /* Rounded corners */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); /* Subtle shadow */
        }
        #fullscreenBtn {
            margin-left: 10px; /* Space between toggle and button */
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #3498db; /* Button background color */
            color: white; /* Button text color */
            border: none; /* Remove default border */
            border-radius: 5px; /* Round button corners */
            transition: background-color 0.3s; /* Smooth button hover */
        }
        #fullscreenBtn:hover {
            background-color: #2980b9; /* Darker color on hover */
        }
        #toggleSwitch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        #toggleSwitch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px; /* More rounded corners */
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 30px; /* Increased height for the toggle */
            width: 30px; /* Increased width for the toggle */
            left: 4px;
            bottom: 2px; /* Adjusted position */
            background-color: white;
            transition: .4s;
            border-radius: 50%; /* Fully rounded toggle */
        }
        #toggleSwitch input:checked + .slider {
            background-color: #3498db;
        }
        #toggleSwitch input:focus + .slider {
            box-shadow: 0 0 1px #3498db;
        }
        #toggleSwitch input:checked + .slider:before {
            transform: translateX(26px);
        }
        #gameTitle {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px; /* Space between title and iframe */
            text-transform: capitalize; /* Ensures title is capitalized */
        }

        /* Custom scrollbar styles */
        ::-webkit-scrollbar {
            width: 12px; /* Width of the scrollbar */
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; /* Light grey background for the track */
            border-radius: 10px; /* Rounded corners for the track */
        }
        ::-webkit-scrollbar-thumb {
            background: #ff8c00; /* Orange color for the scrollbar handle */
            border-radius: 10px; /* Rounded corners for the handle */
            border: 3px solid #f1f1f1; /* Space between the thumb and track */
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #e07b00; /* Darker orange on hover */
        }
        /* For Firefox */
        body {
            scrollbar-width: thin; /* Thin scrollbar for Firefox */
            scrollbar-color: #ff8c00 #f1f1f1; /* Orange handle and light grey track for Firefox */
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <iframe id="gameFrame" src="" frameborder="0"></iframe>
        <div id="gameTitle">Game Title Here</div>
        <div id="controls">
            <label id="toggleSwitch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
            <button id="fullscreenBtn">Go Fullscreen</button>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            const currentTheme = localStorage.getItem('theme') || 'light';

            // Set initial theme
            setTheme(currentTheme);
            themeToggle.checked = currentTheme === 'dark';

            themeToggle.addEventListener('change', () => {
                const newTheme = themeToggle.checked ? 'dark' : 'light';
                setTheme(newTheme);
            });

            function setTheme(theme) {
                document.body.style.backgroundColor = theme === 'dark' ? '#333' : '#f0f0f0';
                document.body.style.color = theme === 'dark' ? '#fff' : '#000';
                localStorage.setItem('theme', theme);
            }
        });

        const serverUrl1 = "https://ubghyper.github.io/GameList.github.io";
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const gameUrl = urlParams.get("gameurl");

        if (!gameUrl) {
            alert("Game URL not provided!");
            window.location.href = "/"; // Redirect to homepage if game URL is missing
        } else {
            const embedUrl = `${serverUrl1}/${gameUrl}`;
            document.getElementById("gameFrame").src = embedUrl;

            // Format game title from the URL
            const gameTitle = gameUrl.split('/').pop().replace(/\.html$/, ''); // Remove .html
            const formattedTitle = gameTitle.replace(/-/g, ' '); // Replace hyphens with spaces
            document.getElementById("gameTitle").innerText = formattedTitle;
        }

        const iframe = document.getElementById('gameFrame');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const faviconLink = document.getElementById('favicon');

        fullscreenBtn.addEventListener('click', () => {
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.mozRequestFullScreen) { // Firefox
                iframe.mozRequestFullScreen();
            } else if (iframe.webkitRequestFullscreen) { // Chrome, Safari and Opera
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) { // IE/Edge
                iframe.msRequestFullscreen();
            }
        });
    </script>
</body>
</html>
