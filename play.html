<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBGHyper - Home</title>
  <link rel="stylesheet" href="config/main.css">
  <style>
    /* Move styles to a separate CSS file or keep them here, but avoid mixing with JavaScript */
    body {
      margin: 0;
      padding: 0;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
<iframe>
</iframe>
<div class="game-title">
  <div>
    </span>
    </span>
  </div>
  <button onclick="toggleFullscreen()">
    <img src="../Icons/fullscreen.svg" alt="Fullscreen" width="32" height="32"
    />
  </button>
</div>
  <iframe id="gameFrame"
    width="800px" height="600px" frameborder="0" style=" display: block; border: 20px solid #706f6f; background-image: url('../Icons/boot.gif'); background-size: auto; backround-repeat: no-repeat; background-position: 50%; "
</iframe>
  <script type="module">
    // Removed duplicate script tag and moved JavaScript code to the bottom of the body
    const serverUrl = "https://parcoil-assets.onrender.com";
    const urlParams = new URLSearchParams(window.location.search);
    const gameUrl = urlParams.get("gameurl");

    if (!gameUrl) {
      alert("Game URL not provided!");
      window.location.href = "/"; // Redirect to homepage if game URL is missing
    } else {
      const embedUrl = `${serverUrl}/${gameUrl}`;
      document.getElementById("gameFrame").src = embedUrl;
    }

//spacer//
      function toggleFullscreen() {
    var iframe = document.getElementById("gameurl");
    if (!document.fullscreenElement) {
      iframe.requestFullscreen().
      catch((err) = >{
        console.log(`Error attempting to enable full - screen mode: $ {
          err.message
        } ($ {
          err.name
        })`);
      });
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    }
  }
  </script>
</body>
</html>
