<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGHyper</title>
    <link id="favicon" rel="icon" href="../assets/icons/ubghyper.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"> <!-- Google Font -->
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-image: url('../assets/background/background.png'); 
            background-size: cover;
            background-position: center;
            font-family: 'Roboto', sans-serif; /* Apply the font to the body */
        }
        #gameFrame {
            border: 10px solid #676666;
            border-bottom: 10px solid #676666;
            border-radius: 20px;
            background: url('../assets/background/loading.gif');
            width: 950px;
            height: 750px;
            box-sizing: border-box;
            position: relative;
        }
    #controls {
        position: absolute;
        bottom: 10px;
        left: 10px;
        display: flex;
        justify-content: center; /* Center items horizontally */
        align-items: center;
        background: #827e7d;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        width: calc(100% - 20px); /* Adjust width to fit the container */
    }
        #fullscreenBtn {
            margin-left: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #615f5f;
            color: #000000;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        #fullscreenBtn:hover {
            background-color: #ff5405;
        }
        #toggleSwitch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        #toggleSwitch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #f6f6f6;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 30px;
            width: 30px;
            left: 4px;
            bottom: 2px;
            background-color: #000000;
            transition: .4s;
            border-radius: 50%;
        }
        #toggleSwitch input:checked + .slider {
            background-color: #f25f16;
        }
        #toggleSwitch input:focus + .slider {
            box-shadow: 0 0 1px #eb6315;
        }
        #toggleSwitch input:checked + .slider:before {
            transform: translateX(26px);
        }
    #gameTitle, #gameCredits {
        display: inline-block; /* Ensure these are inline-block for spacing */
        margin: 0 10px; /* Add margin for spacing between title and credits */
    }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <iframe id="gameFrame" src="" frameborder="0"></iframe>
        <div id="controls">
            <div id="gameTitle" style="display: inline-block;">Game Title Here</div>
            <div id="gameCredits" style="display: inline-block; margin-left: 10px;">Developer: Developer Name Here</div>
            <label id="toggleSwitch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
             <button id="fullscreenBtn">Go Fullscreen</button>
        </div>
    </div>
    <script>

        fetch("./config/games.json")
    .then(response => response.json())
    .then(data => {
        const gameData = data.find(game => game.url === gameUrl);
        
        if (gameData) {
            document.getElementById("gameTitle").innerText = gameData.name; 
            document.getElementById("gameCredits").innerText = `Developer: ${gameData.credits}`;
        } else {
            document.getElementById("gameTitle").innerText = "Game Not Found";
            document.getElementById("gameCredits").innerText = "Developer: Unknown";
        }
    })
    .catch(error => {
        console.error("Error fetching game data:", error);
        document.getElementById("gameTitle").innerText = "Error fetching game data";
        document.getElementById("gameCredits").innerText = "Developer: Unknown";
    });
        
        // Ensure the URL does not end with a slash
        if (window.location.search.endsWith('/')) {
            const newUrl = window.location.href.slice(0, -1);
            window.history.replaceState({}, document.title, newUrl);
        }

        const serverUrl1 = "https://ubghyper.github.io/GameList.github.io";
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const gameUrl = urlParams.get("gameurl");

        console.log("Game URL:", gameUrl); // Log the extracted game URL

        if (!gameUrl) {
            alert("Game URL not provided!");
            window.location.href = "/"; // Redirect to homepage if game URL is missing
        } else {
            const embedUrl = `${serverUrl1}/${gameUrl}`;
            const gameFrame = document.getElementById("gameFrame");

            gameFrame.src = embedUrl;

            // Show loading GIF while the iframe is loading
            loading.style.display = "flex";

            gameFrame.onload = function() {
                loading.style.display = "none"; // Hide loading GIF when content is loaded
                gameFrame.style.display = "block"; // Show the iframe
            };

            // Fetch game data
            fetch("./config/games.json")
                .then(response => response.json())
                .then(data => {
                    console.log("Fetched games data:", data); // Log the entire data array
                    const gameData = data.find(game => game.url === gameUrl);
                    
                    if (gameData) {
                        document.getElementById("gameTitle").innerText = gameData.name; 
                        document.getElementById("gameCredits").innerText = `Developer: ${gameData.credits}`;
                    } else {
                        document.getElementById("gameTitle").innerText = "Game Not Found";
                        document.getElementById("gameCredits").innerText = "Developer: Unknown";
                    }
                })
                .catch(error => {
                    console.error("Error fetching game data:", error);
                    document.getElementById("gameTitle").innerText = "Error fetching game data";
                    document.getElementById("gameCredits").innerText = "Developer: Unknown";
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            const currentTheme = localStorage.getItem('theme') || 'light';

            // Set initial theme
            setTheme(currentTheme);
            themeToggle.checked = currentTheme === 'dark';

            themeToggle.addEventListener('change', () => {
                const newTheme = themeToggle.checked ? 'dark' : 'light';
                setTheme(newTheme);
            });

            function setTheme(theme) {
                document.body.style.backgroundColor = theme === 'dark' ? '#333' : '#f0f0f0';
                document.body.style.color = theme === 'dark' ? '#fff' : '#000';
                localStorage.setItem('theme', theme);
            }
        });

        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            const iframe = document.getElementById('gameFrame');
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.mozRequestFullScreen) {
                iframe.mozRequestFullScreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) {
                iframe.msRequestFullscreen();
            }
        });
    </script>
</body>
</html>
