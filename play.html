<!DOCTYPE html>
<html lang="en">
   <head>
    <script src="../config/global.js"></script>
    <script src="../config/main.js" type="module"></script>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>UBGHyper</title>
      <link id="favicon" rel="icon" href="../assets/icons/ubghyper.ico" type="image/x-icon">
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8895667704497452" crossorigin="anonymous"></script>  
      <style>
                 /* CSS Variables */
                 :root {
            --navbar-bg: #222;
            --navbar-link-color: #fff;
            --link-color: #ff5e00;
            --button-bg: #ff7b00;
         }
         body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f0f0f0;
            background-image: url('../assets/background/background-white.png'); /* Default light background */
            background-size: cover;
            background-position: center;
            transition: background-color 0.3s, color 0.3s, background-image 0.3s;
         }
         #gameFrame {
         display: none; /* Initially hide the iframe */
         border: 10px solid #676666;
         border-radius: 20px;
         background: url('../assets/background/loading.gif') center center no-repeat;
         background-size: cover;
         width: 950px;
         height: 750px;
         box-sizing: border-box;
         position: relative;
         }
         #controls {
         display: flex;
         justify-content: space-between; /* Distribute elements evenly */
         align-items: center;
         background: #464646;
         padding: 15px 30px; /* Increased padding for better spacing */
         border-radius: 10px;
         box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
         margin-top: 20px;
         width: 80%;
         max-width: 900px;
         position: relative; /* For better alignment */
         }
         .styled-button {
         background-color: #b0b0b0;
         color: white;
         border: none;
         border-radius: 5px;
         padding: 15px 25px; /* Adjusted padding */
         text-align: center;
         text-decoration: none;
         font-size: 16px;
         transition: background-color 0.3s, transform 0.3s;
         cursor: pointer;
         margin-right: 20px;
         }
         .styled-button:hover {
         background-color: #ff5e00;
         transform: scale(1.05);
         }
         #fullscreenBtn {
         padding: 12px 22px; /* Adjusted padding */
         font-size: 16px;
         cursor: pointer;
         background-color: #615f5f;
         color: #ffffff;
         border: none;
         border-radius: 5px;
         transition: background-color 0.3s;
         }
         #fullscreenBtn:hover {
         background-color: #ff5405;
         }
         /* Game Title and Credits */
         #gameTitle, #gameCredits {
         font-size: 18px;
         font-weight: 500;
         color: white;
         margin: 0;
         text-align: center;
         }
         /* Space between game title and credits */
         #gameTitle {
         margin-bottom: 0px; /* Adjusted margin */
         }
         /* Theme Toggle */
         .toggle {
         position: relative;
         display: inline-block;
         width: 60px;
         height: 30px;
         margin-right: 20px; /* Space before fullscreen button */
         }
         .toggle input {
         opacity: 0;
         width: 0;
         height: 0;
         }
         .toggle-slider {
         position: absolute;
         cursor: pointer;
         top: 0;
         left: 0;
         right: 0;
         bottom: 0;
         background-color: #ccc;
         transition: .4s;
         border-radius: 15px;
         }
         .toggle-slider:before {
         position: absolute;
         content: "";
         height: 24px;
         width: 24px;
         left: 3px;
         bottom: 3px;
         background-color: white;
         transition: .4s;
         border-radius: 50%;
         }
         input:checked + .toggle-slider {
         background-color: #ff7b00;
         }
         input:checked + .toggle-slider:before {
         transform: translateX(30px);
         }
         #gameTitle, #gameCredits {
         font-size: 18px;
         font-weight: 500;
         color: white;
         margin: 0 px;
         }
         /* Dark Theme Styles */
         .dark-mode {
         background-color: #333;
         color: #fff;
         background-image: url('../assets/background/background.png'); /* Dark background */
         }
         .dark-mode #controls {
         background: #222;
         }
         .dark-mode #fullscreenBtn {
         background-color: #555;
         }
         .dark-mode .styled-button {
         background-color: #6f6f6f;
         }
 
         /* Navbar */
         .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--navbar-bg);
            padding: 10px 30px;
            position: fixed; /* Make the navbar fixed at the top */
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            border-bottom: 2px solid #444;
         }

         .navbar .logo {
            display: flex;
            align-items: center;
         }

         .navbar .logo h2 {
            color: var(--navbar-link-color);
            font-size: 20px;
            font-weight: 600;
            margin-left: 10px;
         }

         .navbar img {
            height: 30px;
         }

         .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
         }

         .nav-links li {
            margin: 0;
         }

         .nav-links a {
            color: var(--navbar-link-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 18px;
         }

         .nav-links a:hover {
            color: var(--link-color);
         }

         /* Theme Toggle */
         .toggle {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
         }

         .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
         }

         .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 15px;
         }

         .toggle-slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
         }

         input:checked + .toggle-slider {
            background-color: var(--button-bg);
         }

         input:checked + .toggle-slider:before {
            transform: translateX(30px);
         }

         /* Dark Theme Styles */
         .dark-mode {
            background-color: #333;
            color: #fff;
            background-image: url('../assets/background/background.png'); /* Dark background */
         }

         .dark-mode .navbar {
            background-color: #111;
         }

         .dark-mode .navbar a {
            color: #bbb;
         }

         /* Mobile Responsiveness */
         @media (max-width: 768px) {
            .navbar {
               flex-direction: column;
               align-items: flex-start;
            }

            .nav-links {
               flex-direction: column;
               gap: 10px;
               margin-top: 15px;
               width: 100%;
            }

            .nav-links a {
               font-size: 16px;
               padding: 5px 0;
               width: 100%;
               text-align: center;
            }
         }

      </style>
   </head>
   <nav class="navbar">
    <div class="logo" style="display: flex; align-items: center;">
        <img src="../assets/icons/ubghyper.ico" alt="Logo" style="height: 30px; margin-right: 10px;">
        <h2>UBGHyper</h2>
    </div>
    <ul class="nav-links">
        <li><a href="https://ubghyper.github.io/">Home</a></li>
        <li><a href="https://ubghyper.github.io/games.html">Games</a></li>
        <li><a href="https://ubghyper.github.io/customize.html">Customize</a></li>
        <li><a href="https://ubghyper.github.io/contact.html">Contact</a></li>
        <li><a href="https://ubghyper.github.io/savedata.html">Save Editor</a></li>
    </ul>

    <!-- Theme Toggle -->
    <div class="toggle-group">
        <label class="toggle" aria-label="Toggle theme">
            <input type="checkbox" id="themeToggle">
            <span class="toggle-slider"></span>
        </label>
    </div>
</nav>

   <body>
      <div style="display: flex; flex-direction: column; align-items: center;">
         <iframe id="gameFrame" src="" frameborder="0"></iframe>
         <div id="controls">
            <a href="index.html" class="styled-button">Back</a>
            <div id="gameTitle">Game Title Here</div>
            <div id="gameCredits">Developer Name Here</div>
            </label>
            <button id="fullscreenBtn">Go Fullscreen</button>
         </div>
      </div>
      <script>
         // Fetch game data
         const queryString = window.location.search;
         const urlParams = new URLSearchParams(queryString);
         let gameUrl = urlParams.get("gameurl");
         
         if (!gameUrl) {
             alert("Game URL not provided!");
             window.location.href = "/"; // Redirect to homepage if game URL is missing
         } else {
             // Remove trailing slash if it exists
             gameUrl = gameUrl.endsWith("/") ? gameUrl.slice(0, -1) : gameUrl;
         
             const serverUrl1 = "https://ubghyper.github.io/GameList.github.io";
             const embedUrl = `${serverUrl1}/${gameUrl}`;
         
             // Fetch game data
             fetch("./config/games.json")
                 .then(response => response.json())
                 .then(data => {
                     const gameData = data.find(game => game.url === gameUrl);
                     if (gameData) {
                         document.getElementById("gameTitle").innerText = gameData.name;
                         document.getElementById("gameCredits").innerText = `Developer: ${gameData.credits}`;
                     } else {
                         document.getElementById("gameTitle").innerText = "Game Not Found";
                         document.getElementById("gameCredits").innerText = "Developer: Unknown";
                     }
                 })
                 .catch(error => {
                     console.error("Error fetching game data:", error);
                     document.getElementById("gameTitle").innerText = "Error fetching game data";
                     document.getElementById("gameCredits").innerText = "Developer: Unknown";
                 });
         
             const gameFrame = document.getElementById("gameFrame");
             gameFrame.src = embedUrl;
         
             // Show loading GIF while the iframe is loading
             gameFrame.onload = function() {
                 gameFrame.style.display = "block"; // Show the iframe
             };
         }
         
         
                 // Fullscreen functionality
                 const fullscreenBtn = document.getElementById('fullscreenBtn');
                 fullscreenBtn.addEventListener('click', () => {
                     const iframe = document.getElementById('gameFrame');
                     if (iframe.requestFullscreen) {
                         iframe.requestFullscreen();
                     } else if (iframe.mozRequestFullScreen) { // Firefox
                         iframe.mozRequestFullScreen();
                     } else if (iframe.webkitRequestFullscreen) { // Chrome, Safari, Opera
                         iframe.webkitRequestFullscreen();
                     } else if (iframe.msRequestFullscreen) { // IE/Edge
                         iframe.msRequestFullscreen();
                     }
                 });
         
                 // Theme toggle functionality
                 document.addEventListener('DOMContentLoaded', () => {
                     const themeToggle = document.getElementById('themeToggle');
                     const currentTheme = localStorage.getItem('theme') || 'light';
         
                     // Set initial theme
                     setTheme(currentTheme);
                     themeToggle.checked = currentTheme === 'dark';
         
                     themeToggle.addEventListener('change', () => {
                         const newTheme = themeToggle.checked ? 'dark' : 'light';
                         setTheme(newTheme);
                     });
         
                     function setTheme(theme) {
                         if (theme === 'dark') {
                             document.body.classList.add('dark-mode');
                         } else {
                             document.body.classList.remove('dark-mode');
                         }
                         localStorage.setItem('theme', theme);
                     }
                 });
                 
             
      </script>
   </body>
</html>
