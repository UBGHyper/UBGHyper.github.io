<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBGHyper - Home</title>
  <link rel="stylesheet" href="config/main.css">
  <style>
    /* Add some basic styling for the back button */
    .back-button {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1; /* make sure it's on top of the iframe */
    }
  </style>
</head>
<body>
  <!-- Add the back button -->
  <a href="index.html" class="back-button">
    <img src="../content/favicons/back.svg" alt="Back" width="32" height="32"/>
  </a>
  <iframe id="gameFrame"
    width="800px" height="600px" frameborder="0" style="display: block; border: 20px solid #706f6f; background-image: url('../Icons/boot.gif'); background-size: auto; background-repeat: no-repeat; background-position: 50%;">
  </iframe>
  <div class="game-title">
    <div>
      <!-- game title content here -->
    </div>
  </div>
  <button onclick="toggleFullscreen()">
    <img src="../Icons/fullscreen.svg" alt="Fullscreen" width="32" height="32"/>
  </button>
  <script type="module">
    const serverUrl = "https://parcoil-assets.onrender.com";
    const urlParams = new URLSearchParams(window.location.search);
    const gameUrl = urlParams.get("gameurl");

    if (!gameUrl) {
      alert("Game URL not provided!");
      window.location.href = "/"; // Redirect to homepage if game URL is missing
    } else {
      const embedUrl = `${serverUrl}/${gameUrl}`;
      document.getElementById("gameFrame").src = embedUrl;
    }

    function toggleFullscreen() {
      var iframe = document.getElementById("gameFrame"); // fix the id here
      if (!document.fullscreenElement) {
        iframe.requestFullscreen()
        .catch((err) => {
          console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
        });
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    }
  </script>
</body>
</html>
