<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGHyper</title>
    <link id="favicon" rel="icon" href="../assets/icons/ubghyper.ico" type="image/x-icon">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-image: url('../assets/background/background.png'); /* Replace with your image path */
            background-size: cover;
            background-position: center;
            transition: background-color 0.3s, color 0.3s;
        }
        #gameFrame {
            border: 10px solid #ababab;
            border-bottom: 70px solid #f7b97e;
            border-radius: 20px;
            width: 300%;
            height: 740px;
            transition: all 1s ease;
            box-sizing: border-box;
            position: relative;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            display: flex;
            align-items: center;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        #fullscreenBtn {
            margin-left: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        #fullscreenBtn:hover {
            background-color: #2980b9;
        }
        #toggleSwitch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        #toggleSwitch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 30px;
            width: 30px;
            left: 4px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        #toggleSwitch input:checked + .slider {
            background-color: #3498db;
        }
        #toggleSwitch input:focus + .slider {
            box-shadow: 0 0 1px #3498db;
        }
        #toggleSwitch input:checked + .slider:before {
            transform: translateX(26px);
        }
        #gameTitle {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
            text-transform: capitalize;
        }
        #gameCredits {
            font-size: 16px;
            color: #555;
            margin-top: 5px; /* Space between title and credits */
        }
        /* Custom scrollbar styles */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff8c00;
            border-radius: 10px;
            border: 3px solid #f1f1f1;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #e07b00;
        }
        /* For Firefox */
        body {
            scrollbar-width: thin;
            scrollbar-color: #ff8c00 #f1f1f1;
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <iframe id="gameFrame" src="" frameborder="0"></iframe>
        <div id="gameTitle">Game Title Here</div>
        <div id="gameCredits">Developer: Developer Name Here</div> <!-- New element for credits -->
        <div id="controls">
            <label id="toggleSwitch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
            <button id="fullscreenBtn">Go Fullscreen</button>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            const currentTheme = localStorage.getItem('theme') || 'light';

            // Set initial theme
            setTheme(currentTheme);
            themeToggle.checked = currentTheme === 'dark';

            themeToggle.addEventListener('change', () => {
                const newTheme = themeToggle.checked ? 'dark' : 'light';
                setTheme(newTheme);
            });

            function setTheme(theme) {
                document.body.style.backgroundColor = theme === 'dark' ? '#333' : '#f0f0f0';
                document.body.style.color = theme === 'dark' ? '#fff' : '#000';
                localStorage.setItem('theme', theme);
            }
        });

        const serverUrl1 = "https://ubghyper.github.io/GameList.github.io";
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const gameUrl = urlParams.get("gameurl");

        if (!gameUrl) {
            alert("Game URL not provided!");
            window.location.href = "/"; // Redirect to homepage if game URL is missing
        } else {
            const embedUrl = `${serverUrl1}/${gameUrl}`;
            document.getElementById("gameFrame").src = embedUrl;

            // Format game title and credits from the URL
            const gameTitle = gameUrl.split('/').pop().replace(/\.html$/, ''); // Remove .html
            const formattedTitle = gameTitle.replace(/-/g, ' '); // Replace hyphens with spaces
            document.getElementById("gameTitle").innerText = formattedTitle;

            // Retrieve the corresponding game data to display credits
            fetch("./config/games.json")
                .then(response => response.json())
                .then(data => {
                    const gameData = data.find(game => game.url === gameUrl);
                    if (gameData) {
                        document.getElementById("gameCredits").innerText = `Developer: ${gameData.credits}`;
                    }
                })
                .catch(error => console.error("Error fetching game data:", error));
        }

        const iframe = document.getElementById('gameFrame');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const faviconLink = document.getElementById('favicon');

        fullscreenBtn.addEventListener('click', () => {
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.mozRequestFullScreen) { // Firefox
                iframe.mozRequestFullScreen();
            } else if (iframe.webkitRequestFullscreen) { // Chrome, Safari, and Opera
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) { // IE/Edge
                iframe.msRequestFullscreen();
            }
        });
    </script>
</body>
</html>
