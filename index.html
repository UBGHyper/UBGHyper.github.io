<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="21YhGY4My3yQLoryE7UachSeo4rYTdep6Db3qq27PG8" />
    <meta name="google-adsense-account" content="ca-pub-8895667704497452">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGHyper - Home</title>
    <link rel="stylesheet" href="config/main.css">
    <script src="config/main.js" type="module"></script>
    <link rel="icon" type="image/png" href="content/favicons/tab.png">
    <style>
        .toggle-switch,
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .toggle-switch input[type="checkbox"],
        .switch input[type="checkbox"] {
            display: none;
        }

        .toggle-slider,
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .toggle-slider:before,
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        .toggle-switch input[type="checkbox"]:checked + label .toggle-slider,
        .switch input[type="checkbox"]:checked + .slider {
            background-color: #333;
        }

        .toggle-switch input[type="checkbox"]:checked + label .toggle-slider:before,
        .switch input[type="checkbox"]:checked + .slider:before {
            transform: translateX(26px);
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            color: #333;
            transition: background-color 0.5s, color 0.5s;
        }

        body.light-mode {
            background-color: white;
            color: black;
        }

        body.dark-mode {
            background-color: black;
            color: white;
        }

        body.blue-mode {
            background-color: #add8e6;
            color: #003366;
        }

        body::-webkit-scrollbar {
            width: 12px;
        }

        body::-webkit-scrollbar-track {
            background: black;
        }

        body.light-mode::-webkit-scrollbar-track {
            background: #ccc;
        }

        body.blue-mode::-webkit-scrollbar-track {
            background: #87cefa;
        }

        body::-webkit-scrollbar-thumb {
            background-color: black;
            border-radius: 20px;
            border: 3px solid orange;
        }

        .center {
            text-align: center;
            margin: 20px 0;
        }

        .center h1 {
            margin: 10px 0;
            font-family: 'Apple-font', sans-serif;
        }

        #searchInput {
            padding: 10px;
            width: 80%;
            max-width: 400px;
            border: 2px solid orange;
            border-radius: 5px;
            font-size: 16px;
        }

        #gamesContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
        }

        .footer.light-mode {
            background-color: #ccc;
            color: black;
        }

        .footer.dark-mode {
            background-color: #333;
            color: white;
        }

        .footer.blue-mode {
            background-color: #87cefa;
            color: #003366;
        }

        .footer h1 {
            margin: 5px 0;
            font-family: 'Apple-font', sans-serif;
        }

        .game-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .game-square {
            width: 100px;
            height: 100px;
            background-color: orange;
            margin: 10px;
            border-radius: 10px;
        }

        .switch-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 60px;
            background-color: orange;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
        }

        .mode-text {
            font-family: 'Apple-font', sans-serif;
            color: #333;
        }

        .mode-text.light-mode {
            color: black;
        }

        .mode-text.dark-mode {
            color: white;
        }

        .mode-text.blue-mode {
            color: #003366;
        }

        .theme-select {
            margin-left: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="center">
        <h1 class="Apple-font">UBG Hyper</h1>
        <h1 class="Apple-font">↓ Games ↓</h1>
    </div>
    <div class="center">
        <input type="text" id="searchInput" placeholder="Search games">
    </div>
    <div id="gamesContainer"></div>
    <div class="footer">
        <h1 class="Apple-font">A Website By</h1>
        <h1 class="Apple-font">Fibble</h1>
    </div>
    <div class="game-container">
        <div class="game-square"></div>
    </div>
    <div class="switch-container">
        </label>
        <span class="mode-text">Dark Mode On</span>
        <div class="toggle-switch">
            <input type="checkbox" id="toggle-switch" />
            <label for="toggle-switch">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <select id="themeSelect" class="theme-select">
            <option value="default">Select Theme</option>
            <option value="light-mode">Light</option>
            <option value="dark-mode">Dark</option>
            <option value="blue-mode">Blue</option>
        </select>
    </div>
    <script>
        const toggleSwitch = document.getElementById("toggle-switch");
        const favicon = document.querySelector("link[rel='icon']");
        const defaultFavicon = "content/favicons/tab.png";
        const toggledFavicon = "content/favicons/classroom.png";
        const defaultTitle = "UBGHyper - Home";
        const toggledTitle = "Classroom";

        toggleSwitch.addEventListener("change", () => {
            if (toggleSwitch.checked) {
                favicon.href = toggledFavicon;
                document.title = toggledTitle;
            } else {
                favicon.href = defaultFavicon;
                document.title = defaultTitle;
            }
        });

        document.getElementById('lightModeToggle').addEventListener('change', function() {
            document.body.classList.toggle('light-mode');
            document.querySelector('.footer').classList.toggle('light-mode');
            document.querySelector('.mode-text').classList.toggle('light-mode');
            document.querySelector('.mode-text').textContent = this.checked ? 'Dark Mode Off' : 'Dark Mode On';
        });

        document.getElementById('themeSelect').addEventListener('change', function() {
            const theme = this.value;
            document.body.className = theme;
            document.querySelector('.footer').className = `footer ${theme}`;
            document.querySelector('.mode-text').className = `mode-text ${theme}`;
        });
    </script>
</body>
</html>
