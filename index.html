<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8895667704497452" crossorigin="anonymous"></script>
    <meta name="google-site-verification" content="21YhGY4My3yQLoryE7UachSeo4rYTdep6Db3qq27PG8" />
    <meta name="google-adsense-account" content="ca-pub-8895667704497452">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGHyper - Home</title>
    <link rel="stylesheet" href="config/main.css">
    <script src="config/main.js" type="module"></script>
    <link rel="icon" type="image/png" href="content/favicons/tab.png">
    <style>
        /* Add your styles here */
        #easterEggImage {
            display: none;
            position: absolute;
            top: 10%;
            left: 10%;
            width: 300px;
            z-index: 1000;
        }
        #colorChangeDiv {
            padding: 20px;
            background-color: lightgray;
            cursor: pointer;
        }
        .secret-button-container {
            display: none; /* Initially hidden */
        }
        .confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="center">
        <h1 class="Apple-font">UBG Hyper</h1>
        <h1 class="Apple-font">↓ Games ↓</h1>
    </div>
    <div class="center">
        <input type="text" id="searchInput" placeholder="Search games">
    </div>
    <div id="gamesContainer"></div>
    <div class="footer">
        <h1 class="Apple-font">A Website By</h1>
        <h1 class="Apple-font">Fibble</h1>
    </div>
    <div class="game-container">
        <div class="game-square"></div>
    </div>
    <div class="switch-container">
        <button style="background-color: #4CAF50; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;" onclick="window.location.href='https://soggycat0.github.io';">SoggyCat0</button>
        <div class="toggle-switch">
            <input type="checkbox" id="toggle-switch" />
            <label for="toggle-switch">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <button style="background-color: #4CAF50; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;" onclick="window.location.href='https://forms.gle/fEKyBwT683ABdtkz6';">Suggestions</button>
    </div>
    <select id="themeSelect">
        <option value="">Default</option>
        <option value="dark-theme">Dark</option>
        <option value="light-theme">Light</option>
    </select>

    <!-- Secret Button -->
    <div class="secret-button-container">
        <button id="secretButton">Find the Secret!</button>
    </div>

    <!-- Confetti Container -->
    <div id="confetti" class="confetti-container"></div>

    <!-- Easter Egg Image -->
    <img id="easterEggImage" src="https://example.com/easter-egg-image.png" alt="Easter Egg" />

    <!-- Color Change Div -->
    <div id="colorChangeDiv">
        Click me to change background color!
    </div>

    <script>
        document.addEventListener('dblclick', () => {
            alert("You found the hidden message! 🎉");
        });

        function getRandomColor() {
            const letters = "0123456789ABCDEF";
            let color = "#";
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        const toggleSwitch = document.getElementById("toggle-switch");
        const favicon = document.querySelector("link[rel='icon']");
        const defaultFavicon = "content/favicons/tab.png";
        const toggledFavicon = "content/favicons/classroom.png";
        const defaultTitle = "UBGHyper - Home";
        const toggledTitle = "Classroom";

        toggleSwitch.addEventListener("change", () => {
            favicon.href = toggleSwitch.checked ? toggledFavicon : defaultFavicon;
            document.title = toggleSwitch.checked ? toggledTitle : defaultTitle;
        });

        document.getElementById('themeSelect').addEventListener('change', function() {
            const theme = this.value;
            document.body.className = theme;
            document.querySelector('.footer').className = `footer ${theme}`;
            document.querySelector('.mode-text')?.classList.add(theme);
        });

        document.getElementById('colorChangeDiv').addEventListener('click', () => {
            document.body.style.backgroundColor = getRandomColor();
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === 'S' && event.ctrlKey) {
                document.querySelector('.secret-button-container').style.display = 'block';
            }
        });

        document.getElementById('secretButton').addEventListener('click', () => {
            window.location.href = 'https://example.com/secret'; // Replace with your secret page URL
        });

        // Confetti Animation
        document.getElementById('confettiButton')?.addEventListener('click', () => {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
</body>
</html>
