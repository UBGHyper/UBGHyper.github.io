<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-adsense-account" content="ca-pub-8895667704497452">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGHyper - Home</title>
    <link rel="stylesheet" href="config/main.css">

    <link rel="icon" type="image/png" href="content/favicons/tab.png">
    <style>
        .toggle-button {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            margin-right: 10px;
        }

        .toggle-button input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #333;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }


//seperator//
        body {

        body::-webkit-scrollbar-thumb {

        .center {

        .footer.light-mode {

        .game-container {

        .switch-container {
            position: fixed;

            width: 2000px;
            background-color: orange;

        .switch {
            position: relative;

            height: 34px;
            margin-right: 10px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;

        input:checked + .slider {

<body>
    <div class="center">
        <h1 class="Apple-font">UBG Hyper</h1>
        <h1 class="Apple-font">↓ Games ↓</h1>
    </div>
    <div class="center">
        <input type="text" id="searchInput" placeholder="Search games">
    </div>
    <div id="gamesContainer"></div>
    <div class="footer">
        <h1 class="Apple-font">A Website By</h1>
        <h1 class="Apple-font">Fibble</h1>
    </div>
    <div class="game-container">
        <div class="game-square"></div>
    </div>
    <div class="switch-container">
        <label class="switch">
            <input type="checkbox" id="lightModeToggle">
            <span class="slider"></span>
        </label>
        <span class="mode-text">Dark Mode On</span>
            <div class="switch-container">
        <label class="switch">
            <input type="checkbox" id="lightModeToggle">
            <span class="slider"></span>
        </label>
        <span class="mode-text">Dark Mode On</span>
        <button id="changeTabButton" class="toggle-button">
  <i class="fas fa-toggle-on"></i> Toggle Tab
</button>
    </div>
    <script>
class ToggleButton {
  constructor(buttonId, defaultFavicon, toggledFavicon, defaultTitle, toggledTitle) {
    this.button = document.getElementById(buttonId);
    this.favicon = document.querySelector("link[rel='icon']");
    this.defaultFavicon = defaultFavicon;
    this.toggledFavicon = toggledFavicon;
    this.defaultTitle = defaultTitle;
    this.toggledTitle = toggledTitle;
    this.isToggled = false;

    this.button.addEventListener("click", () => this.toggle());
  }

  toggle() {
    if (!this.isToggled) {
      this.favicon.href = this.toggledFavicon;
      document.title = this.toggledTitle;
    } else {
      this.favicon.href = this.defaultFavicon;
      document.title = this.defaultTitle;
    }

    this.isToggled = !this.isToggled;
  }
}

const toggleButton = new ToggleButton(
  "changeTabButton",
  "content/favicons/tab.png",
  "content/favicons/classroom.png",
  "UBGHyper - Home",
  "Classroom"
);
            document.getElementById('lightModeToggle').addEventListener('change', function() {
            document.body.classList.toggle('light-mode');
            document.querySelector('.footer').classList.toggle('light-mode');
            document.querySelector('.mode-text').classList.toggle('light-mode');
            document.querySelector('.mode-text').textContent = this.checked ? 'Dark Mode Off' : 'Dark Mode On';
        });
        document.getElementById('lightModeToggle').addEventListener('change', function() {
            document.body.classList.toggle('light-mode');
            document.querySelector('.footer').classList.toggle('light-mode');
            document.querySelector('.mode-text').classList.toggle('light-mode');
            document.querySelector('.mode-text').textContent = this.checked ? 'Dark Mode Off' : 'Dark Mode On';
        });
    </script>
