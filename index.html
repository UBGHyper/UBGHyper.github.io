<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-adsense-account" content="ca-pub-8895667704497452">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGHyper - Home</title>
    <link rel="stylesheet" href="config/main.css">
    <script src="config/main.js" type="module"></script>
    <link rel="icon" type="image/png" href="content/favicons/tab.png">
    <style>
        .toggle-switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 30px;
}

.toggle-switch input[type="checkbox"] {
  display: none;
}

.toggle-slider {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: #ccc;
  border-radius: 30px;
  transition: background-color 0.2s, transform 0.2s;
  cursor: pointer;
}

.toggle-slider:before {
  position: absolute;
  content: "";
  width: 20px;
  height: 20px;
  background-color: #fff;
  border-radius: 50%;
  top: 5px;
  left: 5px;
  transition: transform 0.2s;
}

.toggle-switch input[type="checkbox"]:checked + label .toggle-slider {
  background-color: #66d9ef;
  transform: translateX(30px);
}

.toggle-switch input[type="checkbox"]:checked + label .toggle-slider:before {
  transform: translateX(30px);
}
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            color: #333;
            transition: background-color 0.5s, color 0.5s;
        }

        body.light-mode {
            background-color: white;
            color: black;
        }

        body::-webkit-scrollbar {
            width: 12px;
        }

        body::-webkit-scrollbar-track {
            background: black;
        }

        body.light-mode::-webkit-scrollbar-track {
            background: #ccc;
        }

        body::-webkit-scrollbar-thumb {
            background-color: black;
            border-radius: 20px;
            border: 3px solid orange;
        }

        .center {
            text-align: center;
            margin: 20px 0;
        }

        .center h1 {
            margin: 10px 0;
            font-family: 'Apple-font', sans-serif;
        }

        #searchInput {
            padding: 10px;
            width: 80%;
            max-width: 400px;
            border: 2px solid orange;
            border-radius: 5px;
            font-size: 16px;
        }

        #gamesContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
        }

        .footer.light-mode {
            background-color: #ccc;
            color: black;
        }

        .footer h1 {
            margin: 5px 0;
            font-family: 'Apple-font', sans-serif;
        }

        .game-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .game-square {
            width: 100px;
            height: 100px;
            background-color: orange;
            margin: 10px;
            border-radius: 10px;
        }

        .switch-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 2000px;
            background-color: orange;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            margin-right: 10px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #333;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .mode-text {
            font-family: 'Apple-font', sans-serif;
            color: #333;
        }

        .mode-text.light-mode {
            color: black;
        }
    </style>
</head>
<body>
    <div class="center">
        <h1 class="Apple-font">UBG Hyper</h1>
        <h1 class="Apple-font">↓ Games ↓</h1>
    </div>
    <div class="center">
        <input type="text" id="searchInput" placeholder="Search games">
    </div>
    <div id="gamesContainer"></div>
    <div class="footer">
        <h1 class="Apple-font">A Website By</h1>
        <h1 class="Apple-font">Fibble</h1>
    </div>
    <div class="game-container">
        <div class="game-square"></div>
    </div>
    <div class="switch-container">
        <label class="switch">
            <input type="checkbox" id="lightModeToggle">
            <span class="slider"></span>
        </label>
        <span class="mode-text">Dark Mode On</span>
            <div class="switch-container">
        <label class="switch">
            <input type="checkbox" id="lightModeToggle">
            <span class="slider"></span>
        </label>
        <span class="mode-text">Dark Mode On</span>
<div class="toggle-switch">
  <input type="checkbox" id="toggle-switch" />
  <label for="toggle-switch">
    <span class="toggle-slider"></span>
  </label>
</div>
</button>
    </div>
    <script>
const toggleSwitch = document.getElementById("toggle-switch");
const favicon = document.querySelector("link[rel='icon']");
const defaultFavicon = "content/favicons/tab.png";
const toggledFavicon = "content/favicons/classroom.png";
const defaultTitle = "UBGHyper - Home";
const toggledTitle = "Classroom";

toggleSwitch.addEventListener("change", () => {
  if (toggleSwitch.checked) {
    favicon.href = toggledFavicon;
    document.title = toggledTitle;
  } else {
    favicon.href = defaultFavicon;
    document.title = defaultTitle;
  }
});
            document.getElementById('lightModeToggle').addEventListener('change', function() {
            document.body.classList.toggle('light-mode');
            document.querySelector('.footer').classList.toggle('light-mode');
            document.querySelector('.mode-text').classList.toggle('light-mode');
            document.querySelector('.mode-text').textContent = this.checked ? 'Dark Mode Off' : 'Dark Mode On';
        });
        document.getElementById('lightModeToggle').addEventListener('change', function() {
            document.body.classList.toggle('light-mode');
            document.querySelector('.footer').classList.toggle('light-mode');
            document.querySelector('.mode-text').classList.toggle('light-mode');
            document.querySelector('.mode-text').textContent = this.checked ? 'Dark Mode Off' : 'Dark Mode On';
        });
    </script>
</body>
</html>
