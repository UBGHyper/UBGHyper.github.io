<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBGHyper - Home</title>
    <link rel="stylesheet" href="config/main.css">
    <script src="config/main.js" type="module"></script>
    <link rel="icon" type="image/png" href="content/favicons/tab.png">
</head>
<body>
    <div class="center">
        <h1 class="Apple-font">UBG Hyper</h1>
        <h1 class="Apple-font">↓ Games ↓</h1>
    </div>
    <div class="center">
        <input type="text" id="searchInput" placeholder="Search games">
    </div>
    <div id="gamesContainer"></div>
    <div class="footer">
        <h1 class="Apple-font">A Website By</h1>
        <h1 class="Apple-font">Fibble</h1>
    </div>
    <div class="game-container">
        <div class="game-square"></div>
    </div>
    <div class="switch-container">
        <button style="
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        " onclick="window.location.href='https://soggycat0.github.io';">SoggyCat0</button>
        <div class="toggle-switch">
            <input type="checkbox" id="toggle-switch" />
            <label for="toggle-switch">
                <span class="toggle-slider"></span>
            </label>

    <script>
        let konamiCode = [];

        document.addEventListener("keydown", function(event) {
            if (event.key === "ArrowUp") {
                konamiCode.push("Up");
            } else if (event.key === "ArrowDown") {
                konamiCode.push("Down");
            } else if (event.key === "ArrowLeft") {
                konamiCode.push("Left");
            } else if (event.key === "ArrowRight") {
                konamiCode.push("Right");
            } else if (event.key === "b") {
                konamiCode.push("B");
            } else if (event.key === "a") {
                konamiCode.push("A");
            }

            if (konamiCode.join(",") === "Up,Up,Down,Down,Left,Right,Left,Right,B,A") {
                konamiCode = [];
                document.body.style.background = getRandomColor();
            }
        });

        function getRandomColor() {
            const letters = "0123456789ABCDEF";
            let color = "#";
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        const toggleSwitch = document.getElementById("toggle-switch");
        const favicon = document.querySelector("link[rel='icon']");
        const defaultFavicon = "content/favicons/tab.png";
        const toggledFavicon = "content/favicons/classroom.png";
        const defaultTitle = "UBGHyper - Home";
        const toggledTitle = "Classroom";

        toggleSwitch.addEventListener("change", () => {
            if (toggleSwitch.checked) {
                favicon.href = toggledFavicon;
                document.title = toggledTitle;
            } else {
                favicon.href = defaultFavicon;
                document.title = defaultTitle;
            }
        });

        document.getElementById('themeSelect').addEventListener('change', function() {
            const theme = this.value;
            document.body.className = theme;
            document.querySelector('.footer').className = `footer ${theme}`;
        });
    </script>
</body>
</html>
