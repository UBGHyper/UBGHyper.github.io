<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UBG Hyper</title>
    <link rel="stylesheet" href="config/light.css" id="themeStyle" />
    <link rel="icon" href="../assets/icons/ubghyper.ico" id="faviconLink" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8895667704497452"
     crossorigin="anonymous"></script>
  <link rel="icon" type="image/x-icon" sizes="48x48" href="../assets/icons/ubghyper.ico" />
  <link rel="icon" type="shortcut icon" sizes="48x48" href="../assets/icons/ubghyper.ico" />
  <meta property="og:image" content="../assets/icons/ubghyper.ico" />
  <meta property="og:url" content="https://ubghyper.github.io/" />
  <meta property="og:site_name" content="Free, unblocked and fun games" />
  <meta name="theme-color" content="#ff8000" />
  <meta name="google-site-verification" content="Olbv8f2uRODkQ97-bibYZUUNSr2m2cfCUuH82ntbjoQ" />
  <meta property="og:description"
    content="Find fun, unblocked & free games here at UBGHyper." />
  <meta name="description"
    content="Find fun, unblocked & free games here at UBGHyper." />
  <meta name="author" content="UBGHyper on github" />
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            transition: background-color 0.3s, color 0.3s;
        }
        .center {
            text-align: center;
            margin: 20px 0;
        }
        #gamesContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-height: 70vh; 
            overflow-y: auto; 
        }
        .game-card {
            background: white;
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 200px;
            text-align: center; /* Center text in game cards */
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        .fixed-bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(155, 57, 34, 0.5);
            border: 2px solid #9B3922;
            border-radius: 15px; 
            padding: 5px 10px; 
            display: flex;
            align-items: center;
            z-index: 1000;
            gap: 10px;
        }
        .customize-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .customize-button:hover {
            background-color: #45a049;
        }

        /* Custom scrollbar styles */
        ::-webkit-scrollbar {
            width: 12px; 
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 10px; 
        }

        ::-webkit-scrollbar-thumb {
            background: #ff8c00; 
            border-radius: 10px; 
            border: 3px solid #f1f1f1; 
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #e07b00; 
        }

        /* For Firefox */
        body {
            scrollbar-width: thin; 
            scrollbar-color: #ff8c00 #f1f1f1; 
        }
    </style>
    <script src="../config/main.js" type="module"></script>
</head>
<body>
    <div class="center">
        <h1 id="title">Welcome to UBG Hyper</h1>
    </div>
        <div id="gamesContainer"></div>
</div>
    <div class="center">
    </div>
    <div class="fixed-bottom-bar" id="bottomBar" aria-label="Bottom navigation bar">
        <input type="text" id="searchInput" placeholder="Search games" aria-label="Search games" />
        <label class="toggle" aria-label="Toggle theme">
            <input type="checkbox" id="themeToggle" />
            <span class="slider"></span>
        </label>
        <label class="toggle" aria-label="Toggle tab">
            <input type="checkbox" id="tabToggle" />
            <span class="slider"></span>
        </label>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            const tabToggle = document.getElementById('tabToggle');
            const currentTheme = localStorage.getItem('theme') || 'light';
            const faviconLink = document.getElementById('faviconLink');

            // Set initial theme
            setTheme(currentTheme);
            themeToggle.checked = currentTheme === 'dark';

            themeToggle.addEventListener('change', () => {
                const newTheme = themeToggle.checked ? 'dark' : 'light';
                setTheme(newTheme);
            });

            tabToggle.addEventListener('change', () => {
                if (tabToggle.checked) {
                    faviconLink.href = "../assets/icons/googleclassroom.ico";
                    document.title = "Google Classroom";
                } else {
                    faviconLink.href = "../assets/icons/ubghyper.ico";
                    document.title = "UBG Hyper";
                }
            });

            function setTheme(theme) {
                if (theme === 'dark') {
                    document.getElementById('themeStyle').setAttribute('href', 'config/dark.css');
                    document.body.style.backgroundColor = '#333';
                    document.body.style.color = '#fff';
                } else {
                    document.getElementById('themeStyle').setAttribute('href', 'config/light.css');
                    document.body.style.backgroundColor = '#f9f9f9';
                    document.body.style.color = '#000';
                }
                localStorage.setItem('theme', theme);
            }
        });
    </script>
</body>
</html>
