<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize UBG Hyper</title>
    <script src="../js/customization.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8895667704497452"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../config/global.css">
    <script src="../config/global.js"></script>
    <script src="../config/main.js" type="module"></script>
    <link rel="stylesheet" href="config/light.css" id="themeStyle">
    <link rel="icon" href="../assets/icons/ubghyper.ico" id="faviconLink">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
         :root {
         --bg-color: #000000;
         --text-color: #1f1f1f;
         --link-color: #ff6600;
         --navbar-bg: #272727;
         --navbar-link-color: #ffffff;
         --carousel-bg: #fff;
         --button-bg: #ff6600;
         --background-image: url('../assets/background/background.png');
         --font-family: 'Poppins', sans-serif;
         }

        body {
            font-family: var(--font-family, 'Poppins', sans-serif);
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image: var(--background-image);
            background-size: cover;
            background-attachment: fixed;
            transition: all 0.3s ease;
        }

        h1, h2 {
            color: var(--text-color);
        }
                button {
            padding: 15px 25px;
            font-size: 16px;
            background-color: var(--button-bg);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ff5405;
        }

        .navbar {
   display: flex;
   justify-content: space-between;
   align-items: center; /* Ensures items are centered vertically */
   background-color: var(--navbar-bg);
   padding: 3px 15px; /* Further reduce padding to make the nav bar thinner */
   border-bottom: 2px solid #444;
   /* Remove the sticky positioning */
   /* position: sticky; */
   /* top: 0; */
   /* z-index: 10; */
}

.nav-links {
   list-style: none;
   display: flex;
   align-items: center; /* Center the nav links vertically */
   gap: 20px;
   margin: 0;
   padding: 0;
}

.nav-links li {
   margin: 0;
   line-height: 1.5; /* Adjust line-height for better vertical alignment */
}

.nav-links a,
#randomGameBtn {
   color: var(--text-color);
   text-decoration: none;
   font-weight: 500;
   font-size: 18px;
   line-height: 1.5; /* Adjust to align text properly */
   background: none; /* Remove button background */
   border: none; /* Remove button border */
   cursor: pointer; /* Ensure cursor is pointer for button */
   padding: 0; /* Remove any button padding */
   margin: 0;
}

.nav-links a:hover,
#randomGameBtn:hover {
   color: var(--navbar-link-color);
}

        .center {
            text-align: center;
            margin: 20px 0;
        }

        .customize-container {
            width: 80%;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: rgba(73, 73, 73, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .customize-container label {
            font-weight: 600;
            margin-right: 10px;
        }

        .customize-container input,
        .customize-container select,
        .customize-container .slider {
            padding: 10px;
            font-size: 16px;
            margin: 10px 0;
            border-radius: 5px;
            width: 100%;
            border: 1px solid #ff5e00;
        }

        .background-preview {
            width: 100%;
            height: 200px;
            margin-top: 20px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgb(255, 136, 0);
            font-size: 18px;
            font-weight: bold;
        }

        .text-preview {
            margin-top: 20px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.3);
            color: var(--text-color);
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            text-align: center;
            font-family: var(--font-family);
        }

        .live-preview {
            margin-top: 40px;
            text-align: center;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .live-preview p {
            margin: 10px 0;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .customize-container button {
            padding: 10px 20px;
            background-color: var(--button-bg);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: auto;
            font-family: var(--font-family);
        }

        .customize-container button:hover {
            background-color: #e65c00;
        }

        .premade-themes {
            margin-top: 40px;
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .theme-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .theme-button {
            padding: 10px 20px;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            width: 120px;
            position: absolute;
            bottom: 10px;
            transition: transform 0.3s;
            font-family: var(--font-family);
        }

        .theme-button:hover {
            transform: scale(1.05);
        }

        .theme-preview {
            width: 120px;
            height: 80px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 10px;
            position: relative;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" style="display: flex; align-items: center;">
           <!-- Logo Image -->
           <h2>UBGHyper</h2>
        </div>
        <ul class="nav-links">
           <li><a href="https://ubghyper.github.io/">Home</a></li>
           <li><a href="https://ubghyper.github.io/games.html">Games</a></li>
           <li><a href="https://ubghyper.github.io/customize.html">Customize</a></li>
           <li><a href="https://ubghyper.github.io/savedata.html">Save Editor</a></li>
           <button id="randomGameBtn">Random</button>
        </ul>
        <!-- Theme Toggle -->
        </div>
     </nav>

    <div class="center">
        <h1>Customize UBG Hyper</h1>
    </div>

    <div class="customize-container">
        <form id="customizeForm">
            <div>
                <label for="backgroundImage">Background Image URL:</label>
                <input type="text" id="backgroundImage" placeholder="Enter URL for background image" />
            </div>

            <div>
                <label for="fontFamily">Font Family:</label>
                <select id="fontFamily">
                    <option value="Poppins">Poppins</option>
                    <option value="Arial">Arial</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Tahoma">Tahoma</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Times New Roman">Times New Roman</option>
                </select>
            </div>

            <div>
                <label for="themeColor">Theme Color:</label>
                <input type="color" id="themeColor" value="#ff8000" />
            </div>

            <div>
                <label for="textColor">Text Font Color:</label>
                <input type="color" id="textColor" value="#333333" />
            </div>

            <div>
                <label for="navbarColor">Navbar Color:</label>
                <input type="color" id="navbarColor" value="#333333" />
            </div>

            <div class="button-container">
                <button type="button" id="saveButton">Save</button>
                <button type="button" id="resetButton">Reset</button>
            </div>
        </form>

        <div class="background-preview" id="backgroundPreview">
            <span>Background Preview</span>
        </div>

        <div class="text-preview" id="textPreview">
            <span>Text Color Preview</span>
        </div>

        <div class="premade-themes">
            <div class="theme-container">
                <div class="theme-preview" style="background-image: url('../assets/background/calm-vaporwave.png');"></div>
                <button class="theme-button" style="background-color: #f6b3f8;" data-theme="calmvapor">Vaporwave1</button>
            </div>
            <div class="theme-container">
                <div class="theme-preview" style="background-image: url('../assets/background/red-vaporwave.png');"></div>
                <button class="theme-button" style="background-color: #570000;" data-theme="redvapor">Vaporwave2</button>
            </div>
            <div class="theme-container">
                <div class="theme-preview" style="background-image: url('../assets/background/vaporwave-blue.png');"></div>
                <button class="theme-button" style="background-color: #003468;" data-theme="bluevapor">Vaporwave3</button>
            </div>
            <div class="theme-container">
                <div class="theme-preview" style="background-image: url('../assets/background/calm.png');"></div>
                <button class="theme-button" style="background-color: #91caff;" data-theme="calm">Calm</button>
            </div>
            <div class="theme-container">
                <div class="theme-preview" style="background-image: url('../assets/background/collab.png');"></div>
                <button class="theme-button" style="background-color: #007cf8;" data-theme="collab">Collab</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const backgroundImageInput = document.getElementById('backgroundImage');
            const fontFamilySelect = document.getElementById('fontFamily');
            const themeColorPicker = document.getElementById('themeColor');
            const textColorPicker = document.getElementById('textColor');
            const navbarColorPicker = document.getElementById('navbarColor');
            const backgroundPreview = document.getElementById('backgroundPreview');
            const textPreview = document.getElementById('textPreview');
            const saveButton = document.getElementById('saveButton');
            const resetButton = document.getElementById('resetButton');
            const navbar = document.querySelector('.navbar');
            const body = document.body;

            // Default values to reset to
            const defaultValues = {
                backgroundImage: '',
                fontFamily: 'Poppins',
                themeColor: '#ff6600',
                textColor: '#333333',
                navbarColor: '#333333'
            };

            // Load saved settings from localStorage
            const loadSettings = () => {
                const savedSettings = JSON.parse(localStorage.getItem('ubgCustomizations'));
                if (savedSettings) {
                    backgroundImageInput.value = savedSettings.backgroundImage || '';
                    fontFamilySelect.value = savedSettings.fontFamily || 'Poppins';
                    themeColorPicker.value = savedSettings.themeColor || '#ff6600';
                    textColorPicker.value = savedSettings.textColor || '#333333';
                    navbarColorPicker.value = savedSettings.navbarColor || '#333333';
                    applyCustomizations(savedSettings);
                }
            };

            // Function to update preview elements live
            const updatePreview = () => {
                // Update the background preview live
                if (backgroundImageInput.value) {
                    backgroundPreview.style.backgroundImage = `url(${backgroundImageInput.value})`;
                } else {
                    backgroundPreview.style.backgroundImage = ''; // Reset if no URL
                }

                // Update the font family preview live
                const fontFamily = fontFamilySelect.value;
                textPreview.style.fontFamily = fontFamily;

                // Update text preview color live
                textPreview.style.color = textColorPicker.value;

                // Update background color for preview
                backgroundPreview.style.backgroundColor = themeColorPicker.value;
            };

            // Function to apply changes to the actual page
            const applyCustomizations = (customizations) => {
    // Set properties using CSS variables
    document.documentElement.style.setProperty('--font-family', customizations.fontFamily);
    document.documentElement.style.setProperty('--text-color', customizations.textColor);
    document.documentElement.style.setProperty('--navbar-bg', customizations.navbarColor);

    // Directly set styles that won't work with variables
    body.style.backgroundImage = `url(${customizations.backgroundImage || ''})`;
    body.style.fontFamily = customizations.fontFamily;
    body.style.color = customizations.textColor;
    navbar.style.backgroundColor = customizations.navbarColor;

    // Update link and button colors
    document.querySelectorAll('.navbar a').forEach(link => {
        link.style.color = customizations.themeColor;
    });
    document.querySelectorAll('.button-container button').forEach(button => {
        button.style.backgroundColor = customizations.themeColor;
    });
}

            // Save customization settings to localStorage
            const saveSettings = () => {
                const customizations = {
                    backgroundImage: backgroundImageInput.value,
                    fontFamily: fontFamilySelect.value,
                    themeColor: themeColorPicker.value,
                    textColor: textColorPicker.value,
                    navbarColor: navbarColorPicker.value
                };
                localStorage.setItem('ubgCustomizations', JSON.stringify(customizations));
                applyCustomizations(customizations); // Apply customizations immediately
            };

            // Reset to default values
            const resetSettings = () => {
                backgroundImageInput.value = defaultValues.backgroundImage;
                fontFamilySelect.value = defaultValues.fontFamily;
                themeColorPicker.value = defaultValues.themeColor;
                textColorPicker.value = defaultValues.textColor;
                navbarColorPicker.value = defaultValues.navbarColor;

                // Reset preview and live page
                updatePreview();
                applyCustomizations(defaultValues);
                localStorage.removeItem('ubgCustomizations'); // Clear saved settings
            };

            // Event Listeners
            saveButton.addEventListener('click', (event) => {
                event.preventDefault();
                saveSettings();
            });

            resetButton.addEventListener('click', resetSettings);

            // Listen for input changes to update live preview
            backgroundImageInput.addEventListener('input', updatePreview);
            fontFamilySelect.addEventListener('change', updatePreview);
            themeColorPicker.addEventListener('input', updatePreview);
            textColorPicker.addEventListener('input', updatePreview);
            navbarColorPicker.addEventListener('input', updatePreview);

            // Listen for preset theme selection
            const themeButtons = document.querySelectorAll('.theme-button');
            themeButtons.forEach(button => {
                button.addEventListener('click', (event) => {
                    const theme = event.target.getAttribute('data-theme');
                    const themeSettings = getPresetThemeSettings(theme);
                    backgroundImageInput.value = themeSettings.backgroundImage;
                    fontFamilySelect.value = themeSettings.fontFamily;
                    themeColorPicker.value = themeSettings.themeColor;
                    textColorPicker.value = themeSettings.textColor;
                    navbarColorPicker.value = themeSettings.navbarColor;
                    updatePreview(); // Update preview immediately
                });
            });

            // Get preset theme settings
            const getPresetThemeSettings = (theme) => {
                const themes = {
                    calmvapor: {
                        backgroundImage: '../assets/background/calm-vaporwave.png',
                        fontFamily: 'Poppins',
                        themeColor: '#f6b3f8',
                        textColor: '#4a4a4a',
                        navbarColor: '#e3a6e2'
                    },
                    redvapor: {
                        backgroundImage: '../assets/background/red-vaporwave.png',
                        fontFamily: 'Arial',
                        themeColor: '#ff0000',
                        textColor: '#ffffff',
                        navbarColor: '#570000'
                    },
                    bluevapor: {
                        backgroundImage: '../assets/background/vaporwave-blue.png',
                        fontFamily: 'Verdana',
                        themeColor: '#8c9df5',
                        textColor: '#ffffff',
                        navbarColor: '#003468'
                    },
                    calm: {
                        backgroundImage: '../assets/background/calm.png',
                        fontFamily: 'Georgia',
                        themeColor: '#91caff',
                        textColor: '#ffffff',
                        navbarColor: '#004d66'
                    },
                    collab: {
                        backgroundImage: '../assets/background/collab.png',
                        fontFamily: 'Times New Roman',
                        themeColor: '#007cf8',
                        textColor: '#ffffff',
                        navbarColor: '#003366'
                    }
                };
                return themes[theme] || themes['calmvapor'];
            };

            // Load saved settings on page load
            loadSettings();
        });
    </script>
</body>
</html>
